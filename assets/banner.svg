<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="100%" role="img" aria-label="ticket-master">
  <title>ticket-master</title>
  <!-- Icon motif designed by agy (Gemini 3.5 Pro); composed into a banner. -->
  <rect x="0" y="0" width="1000" height="240" rx="18" fill="#0f111a"/>
  <rect x="0" y="0" width="6" height="240" fill="#f59e0b"/>

  <!-- Icon (ticket + routing hub), scaled into the left -->
  <g transform="translate(54,28) scale(0.72)">
    <path d="M 38 89 V 167 A 16 16 0 0 0 54 183 H 78 A 10 10 0 0 1 98 183 H 202 A 16 16 0 0 0 218 167 V 89 A 16 16 0 0 0 202 73 H 98 A 10 10 0 0 1 78 73 H 54 A 16 16 0 0 0 38 89 Z"
          fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="88" y1="89" x2="88" y2="167" stroke="#6366f1" stroke-width="5" stroke-dasharray="0,13" stroke-linecap="round"/>
    <line x1="53" y1="110" x2="73" y2="110" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="53" y1="128" x2="73" y2="128" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="53" y1="146" x2="73" y2="146" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="150" y1="128" x2="185" y2="98" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <line x1="150" y1="128" x2="185" y2="158" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <line x1="150" y1="128" x2="110" y2="128" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <circle cx="150" cy="128" r="13" fill="#6366f1"/>
    <circle cx="110" cy="128" r="8.5" fill="#6366f1"/>
    <circle cx="185" cy="158" r="8.5" fill="#6366f1"/>
    <circle cx="185" cy="98" r="8.5" fill="#f59e0b"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="248" y="118" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#ffffff">ticket<tspan fill="#6366f1">-</tspan>master</text>
  <text x="251" y="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="23" fill="#94a3b8">cross-platform <tspan fill="#f59e0b">·</tspan> multi-provider ticket router</text>
  <text x="251" y="192" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b">type a problem → filed, scored, routed to the right AI provider — or your project's task board</text>
</svg>
