<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <!-- Designed by agy (Gemini 3.5 Pro) via Antigravity CLI; workspace granted with the add-dir flag. -->
  <defs>
    <mask id="center-cutout">
      <rect x="0" y="0" width="256" height="256" fill="#ffffff" />
      <circle cx="150" cy="128" r="6" fill="#000000" />
    </mask>
  </defs>

  <!-- Ticket Body Outline -->
  <path d="M 38 89 V 167 A 16 16 0 0 0 54 183 H 78 A 10 10 0 0 1 98 183 H 202 A 16 16 0 0 0 218 167 V 89 A 16 16 0 0 0 202 73 H 98 A 10 10 0 0 1 78 73 H 54 A 16 16 0 0 0 38 89 Z"
        fill="none"
        stroke="#6366f1"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Perforation Line -->
  <line x1="88" y1="89" x2="88" y2="167"
        stroke="#6366f1"
        stroke-width="5"
        stroke-dasharray="0,13"
        stroke-linecap="round" />

  <!-- Stub Details (Minimal Barcode/Text lines) -->
  <line x1="53" y1="110" x2="73" y2="110" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  <line x1="53" y1="128" x2="73" y2="128" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  <line x1="53" y1="146" x2="73" y2="146" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.4" />

  <!-- Routing Hub Connection Lines & Center Node (Masked for transparency) -->
  <g mask="url(#center-cutout)">
    <line x1="150" y1="128" x2="185" y2="98" stroke="#6366f1" stroke-width="5" stroke-linecap="round" />
    <line x1="150" y1="128" x2="185" y2="158" stroke="#6366f1" stroke-width="5" stroke-linecap="round" />
    <line x1="150" y1="128" x2="110" y2="128" stroke="#6366f1" stroke-width="5" stroke-linecap="round" />
    <circle cx="150" cy="128" r="15" fill="#6366f1" />
  </g>

  <!-- Outer Hub Nodes -->
  <circle cx="110" cy="128" r="8.5" fill="#6366f1" />
  <circle cx="185" cy="158" r="8.5" fill="#6366f1" />
  <circle cx="185" cy="98" r="8.5" fill="#f59e0b" />
</svg>
